<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KodakTienda - Crear cuenta</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="login-bg" id="login-bg"></div>
  <div class="page-center">
    <a class="auth-brand" href="/login.html">
      <img src="/img/logo.svg" alt="" width="34" height="34" />
      <span class="brand-word">Kodak<span class="accent">Tienda</span></span>
    </a>
    <div class="card">
      <h1>Crear cuenta</h1>
      <p class="subtitle">Registrate para conectar tu almacenamiento en la nube.</p>

      <div id="error-box" class="error-box"></div>

      <form id="register-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />

        <label for="password">Contrasena</label>
        <div class="password-field">
          <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required />
          <button type="button" class="password-toggle" data-target="password" aria-label="Mostrar contrasena">👁</button>
        </div>

        <button type="submit" class="primary" id="submit-btn">Crear cuenta</button>
      </form>

      <p class="form-footer">Ya tenes cuenta? <a href="/login.html">Iniciar sesion</a></p>
    </div>
  </div>

  <script type="module">
    import { apiFetch } from '/js/api.js';
    import { initAuthBackground } from '/js/authBg.js';
    import { initPasswordToggles } from '/js/passwordToggle.js';

    initAuthBackground();
    initPasswordToggles();

    const form = document.getElementById('register-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await apiFetch('/api/auth/register', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        window.location.href = '/home.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
