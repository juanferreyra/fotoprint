<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fotoprint</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">fotoprint</div>
    <div>
      <span class="user-email" id="user-email"></span>
      <button class="link-button" id="logout-btn">Cerrar sesion</button>
    </div>
  </div>

  <main class="container container-wide">
    <div id="no-connection" style="display:none">
      <h2>Almacenamiento en la nube</h2>
      <p>Todavia no conectaste ninguna cuenta de almacenamiento.</p>
      <p><a href="/connect.html">Conectar almacenamiento</a></p>
    </div>

    <div id="explorer" style="display:none">
      <div class="explorer-toolbar">
        <nav class="breadcrumb" id="breadcrumb"></nav>
        <div>
          <button class="btn-primary-sm" id="new-folder-btn" type="button">Nueva carpeta</button>
        </div>
      </div>

      <form class="new-folder-form" id="new-folder-form" style="display:none">
        <input type="text" id="new-folder-name" placeholder="Nombre de la carpeta" maxlength="255" required />
        <button type="submit" class="btn-primary-sm">Crear</button>
        <button type="button" class="btn-secondary" id="new-folder-cancel">Cancelar</button>
      </form>

      <div id="error-box" class="error-box"></div>

      <div class="upload-zone" id="upload-zone">
        <p>Arrastra imagenes aca para subirlas, o <button type="button" class="link-button" id="upload-select-btn">elegi un archivo</button></p>
        <input type="file" id="upload-input" multiple accept="image/*" style="display:none" />
      </div>

      <div class="upload-queue" id="upload-queue"></div>

      <div class="entry-list" id="entry-list"></div>
    </div>
  </main>

  <script type="module" src="/js/explorer.js"></script>
</body>
</html>
