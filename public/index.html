<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fotoprint</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">fotoprint</div>
    <div>
      <span class="user-email" id="user-email"></span>
      <button class="link-button" id="logout-btn">Cerrar sesion</button>
    </div>
  </div>

  <main class="container">
    <h2>Almacenamiento en la nube</h2>
    <p id="connection-status">Cargando...</p>
    <p><a href="/connect.html">Conectar / administrar almacenamiento</a></p>
  </main>

  <script type="module">
    import { apiFetch } from '/js/api.js';

    async function loadConnectionStatus() {
      const statusEl = document.getElementById('connection-status');
      const { connections } = await apiFetch('/api/connections');
      const active = connections.find((c) => c.is_active);
      if (active) {
        const labels = { dropbox: 'Dropbox', google_drive: 'Google Drive', s3: 'Amazon S3' };
        statusEl.textContent = `Usando ${labels[active.provider] || active.provider} (${active.account_label}). El explorador de archivos llega en el proximo paso.`;
      } else {
        statusEl.textContent = 'Todavia no conectaste ninguna cuenta de almacenamiento.';
      }
    }

    async function init() {
      try {
        const { user } = await apiFetch('/api/auth/me');
        document.getElementById('user-email').textContent = user.email;
      } catch {
        window.location.href = '/login.html';
        return;
      }
      await loadConnectionStatus();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await apiFetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>
