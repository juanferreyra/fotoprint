<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fotoprint - Conectar almacenamiento</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .provider-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .provider-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s;
    }
    .provider-card:hover {
      box-shadow: var(--shadow-md);
    }
    .provider-card .name {
      font-weight: 600;
    }
    .provider-card .status {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .provider-actions {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/index.html">
      <img src="/img/logo.svg" alt="" width="28" height="28" />
      <span class="brand-word">foto<span class="accent">print</span></span>
    </a>
    <nav class="nav-links">
      <a href="/index.html">Explorador</a>
      <a href="/connect.html">Conectar almacenamiento</a>
    </nav>
    <div class="topbar-right">
      <a id="provider-badge" class="provider-badge" href="/connect.html"></a>
      <span class="user-email" id="user-email"></span>
      <button class="link-button" id="logout-btn">Cerrar sesion</button>
    </div>
  </div>

  <main class="container">
    <h2>Conectar almacenamiento</h2>
    <p>Elegi el proveedor de nube donde queres subir y explorar tus imagenes. Podes tener varios conectados y elegir cual usar.</p>

    <div id="error-box" class="error-box"></div>
    <div id="success-box" class="success-box" style="display:none"></div>

    <div class="provider-list" id="provider-list"></div>
  </main>

  <script type="module">
    import { apiFetch } from '/js/api.js';
    import { highlightActiveNavLink } from '/js/nav.js';

    const PROVIDER_LABELS = {
      dropbox: 'Dropbox',
      google_drive: 'Google Drive',
      s3: 'Amazon S3',
    };

    const listEl = document.getElementById('provider-list');
    const errorBox = document.getElementById('error-box');
    const successBox = document.getElementById('success-box');
    const providerBadge = document.getElementById('provider-badge');

    function updateProviderBadge(connections) {
      const active = connections.find((c) => c.is_active);
      if (active) {
        providerBadge.textContent = `☁ ${PROVIDER_LABELS[active.provider] || active.provider}`;
        providerBadge.style.display = 'inline-flex';
      } else {
        providerBadge.style.display = 'none';
      }
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('visible');
    }

    function render(connections) {
      updateProviderBadge(connections);
      const byProvider = Object.fromEntries(connections.map((c) => [c.provider, c]));
      listEl.innerHTML = '';

      for (const provider of ['dropbox', 'google_drive', 's3']) {
        const conn = byProvider[provider];
        const card = document.createElement('div');
        card.className = 'provider-card';

        const info = document.createElement('div');
        const nameLine = document.createElement('div');
        nameLine.className = 'name';
        nameLine.textContent = PROVIDER_LABELS[provider];
        if (conn && conn.is_active) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'Activo';
          nameLine.appendChild(badge);
        }
        info.appendChild(nameLine);

        const statusLine = document.createElement('div');
        statusLine.className = 'status';
        statusLine.textContent = conn ? `Conectado como ${conn.account_label}` : 'No conectado';
        info.appendChild(statusLine);

        card.appendChild(info);

        const actions = document.createElement('div');
        actions.className = 'provider-actions';

        if (!conn) {
          if (provider === 'dropbox' || provider === 'google_drive') {
            const link = document.createElement('a');
            link.href = `/api/connections/${provider}/start`;
            link.className = 'btn-primary-sm';
            link.textContent = 'Conectar';
            actions.appendChild(link);
          } else {
            const soon = document.createElement('span');
            soon.className = 'status';
            soon.textContent = 'Proximamente';
            actions.appendChild(soon);
          }
        } else {
          if (!conn.is_active) {
            const useBtn = document.createElement('button');
            useBtn.className = 'btn-secondary';
            useBtn.textContent = 'Usar este';
            useBtn.addEventListener('click', () => activate(provider));
            actions.appendChild(useBtn);
          }
          const disconnectBtn = document.createElement('button');
          disconnectBtn.className = 'btn-danger';
          disconnectBtn.textContent = 'Desconectar';
          disconnectBtn.addEventListener('click', () => disconnect(provider));
          actions.appendChild(disconnectBtn);
        }

        card.appendChild(actions);
        listEl.appendChild(card);
      }
    }

    async function load() {
      const { connections } = await apiFetch('/api/connections');
      render(connections);
    }

    async function activate(provider) {
      try {
        const { connections } = await apiFetch(`/api/connections/${provider}/activate`, { method: 'POST' });
        render(connections);
      } catch (err) {
        showError(err.message);
      }
    }

    async function disconnect(provider) {
      try {
        const { connections } = await apiFetch(`/api/connections/${provider}`, { method: 'DELETE' });
        render(connections);
      } catch (err) {
        showError(err.message);
      }
    }

    async function init() {
      try {
        const { user } = await apiFetch('/api/auth/me');
        document.getElementById('user-email').textContent = user.email;
      } catch {
        window.location.href = '/login.html';
        return;
      }
      highlightActiveNavLink();

      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) {
        showError(params.get('error'));
      }
      if (params.get('connected')) {
        successBox.style.display = 'block';
        successBox.textContent = `Conectaste ${PROVIDER_LABELS[params.get('connected')] || params.get('connected')} correctamente.`;
      }
      if (params.get('error') || params.get('connected')) {
        window.history.replaceState({}, '', '/connect.html');
      }

      await load();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await apiFetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>
