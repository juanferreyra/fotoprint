<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fotoprint - Iniciar sesion</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card">
      <h1>Iniciar sesion</h1>
      <p class="subtitle">Entra a tu cuenta de fotoprint.</p>

      <div id="error-box" class="error-box"></div>

      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />

        <label for="password">Contrasena</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <button type="submit" class="primary" id="submit-btn">Iniciar sesion</button>
      </form>

      <p class="form-footer">No tenes cuenta? <a href="/register.html">Crear cuenta</a></p>
    </div>
  </div>

  <script type="module">
    import { apiFetch } from '/js/api.js';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Ingresando...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        window.location.href = '/index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar sesion';
      }
    });
  </script>
</body>
</html>
