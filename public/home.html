<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KodakTienda</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/home.html">
      <img src="/img/logo.svg" alt="" width="28" height="28" />
      <span class="brand-word">Kodak<span class="accent">Tienda</span></span>
    </a>
    <nav class="nav-links">
      <a href="/home.html">Explorador</a>
      <a href="/connect.html" id="connect-nav-link" style="display:none">Conectar almacenamiento</a>
      <a href="/admin.html" id="admin-nav-link" style="display:none">Administrador</a>
    </nav>
    <div class="topbar-right">
      <a id="provider-badge" class="provider-badge" href="/connect.html"></a>
      <span class="user-email" id="user-email"></span>
      <button class="link-button" id="logout-btn">Cerrar sesion</button>
    </div>
  </div>

  <main class="container container-wide">
    <div id="no-connection" class="hero-empty" style="display:none">
      <img src="/img/logo.svg" alt="" width="48" height="48" />
      <h2>Conectá tu almacenamiento</h2>
      <p>Todavía no conectaste ninguna cuenta de almacenamiento en la nube.</p>
      <a class="btn-primary-sm" href="/connect.html">Conectar almacenamiento</a>
    </div>

    <div id="explorer" style="display:none">
      <div class="explorer-toolbar">
        <nav class="breadcrumb" id="breadcrumb"></nav>
        <div class="explorer-toolbar-actions">
          <label class="select-all-label" id="select-all-label" style="display:none">
            <input type="checkbox" id="select-all-checkbox" />
            Seleccionar todo
          </label>
          <button class="btn-secondary" id="download-selected-btn" type="button" style="display:none">Descargar seleccion</button>
          <button class="btn-primary-sm" id="new-folder-btn" type="button">Nueva carpeta</button>
        </div>
      </div>

      <form class="new-folder-form" id="new-folder-form" style="display:none">
        <input type="text" id="new-folder-name" placeholder="Nombre de la carpeta" maxlength="255" required />
        <button type="submit" class="btn-primary-sm">Crear</button>
        <button type="button" class="btn-secondary" id="new-folder-cancel">Cancelar</button>
      </form>

      <div id="error-box" class="error-box"></div>

      <div class="upload-zone" id="upload-zone">
        <p>Arrastra imagenes aca para subirlas, o <button type="button" class="link-button" id="upload-select-btn">elegi un archivo</button></p>
        <input type="file" id="upload-input" multiple accept="image/*" style="display:none" />
      </div>

      <div class="upload-queue" id="upload-queue"></div>

      <div class="entry-list" id="entry-list"></div>
    </div>
  </main>

  <div class="lightbox" id="lightbox" style="display:none">
    <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Cerrar">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script type="module" src="/js/explorer.js"></script>
</body>
</html>
