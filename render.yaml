services:
  - type: web
    name: fotoprint
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Fijamos la version de Node explicitamente: better-sqlite3 tiene
      # codigo nativo (C++) y solo trae binarios precompilados para
      # versiones de Node ya establecidas. Con una version "current" muy
      # nueva (sin binario precompilado todavia) Render intenta compilarlo
      # desde cero con node-gyp y falla.
      - key: NODE_VERSION
        value: 22.22.2
      - key: DATABASE_FILE
        value: ./data/fotoprint.sqlite
      - key: SESSION_SECRET
        generateValue: true
      # Estas hay que completarlas a mano en el dashboard de Render
      # (Environment → Add Environment Variable). No se pueden generar
      # solas porque tienen que ser un hex de 64 caracteres exactos, o
      # vienen de afuera (Dropbox App Console / Google Cloud Console).
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
